<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Canchas Greenpoint</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #171d24; 
            color: #ffffff; 
            margin: 0; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .controles-vista { display: flex; gap: 15px; margin-bottom: 30px; }
        .btn-vista {
            background-color: #2c3540; color: white; border: 1px solid #44505d;
            padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        .btn-vista.activo { background-color: #3b82f6; border-color: #3b82f6; }

        /* Vista Jugador */
        .vista-jugador {
            background-color: #1e252d; width: 100%; max-width: 400px;
            border-radius: 12px; padding: 20px; box-sizing: border-box;
        }
        .header-fecha { display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 1.2em; margin-bottom: 15px; }
        .sub-header { display: flex; justify-content: space-between; color: #9ca3af; font-size: 0.9em; padding-bottom: 10px; border-bottom: 1px solid #2c3540; margin-bottom: 10px; }
        .turno-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #2c3540; cursor: pointer; transition: 0.2s; }
        .turno-item:hover { background-color: #242c36; }
        .punto-verde { height: 10px; width: 10px; background-color: #10b981; border-radius: 50%; margin-right: 15px; }
        .hora { font-weight: bold; margin-right: 8px; }
        .texto-disponible { color: #d1d5db; font-size: 0.9em; }

        /* Vista Club */
        .vista-club {
            display: none; background-color: #1e252d; width: 100%; max-width: 600px;
            border-radius: 12px; padding: 20px; box-sizing: border-box;
        }
        .reservas-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px;
        }
        .tarjeta-reserva {
            background-color: #f6a74b; color: #171d24; padding: 12px; border-radius: 8px; font-size: 0.9em; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .tarjeta-reserva p { margin: 5px 0; }
        .mensaje-vacio { color: #9ca3af; text-align: center; margin-top: 20px; grid-column: 1 / -1; }
    </style>
</head>
<body>

    <div class="controles-vista">
        <button id="btn-jugador" class="btn-vista activo" onclick="window.cambiarVista('jugador')">📱 Vista Jugadores</button>
        <button id="btn-club" class="btn-vista" onclick="window.cambiarVista('club')">💻 Vista Club</button>
    </div>

    <div id="pantalla-jugador" class="vista-jugador">
        <h2 style="margin-top: 0; margin-bottom: 25px;">Reserva de canchas</h2>
        <div class="header-fecha"><span style="color:#9ca3af;">&lt;</span><span>Hoy</span><span style="color:#9ca3af;">&gt;</span></div>
        <div class="sub-header"><span>Cancha 1</span><span>Greenpoint</span></div>
        <div id="lista-horarios">Cargando horarios...</div>
    </div>

    <div id="pantalla-club" class="vista-club">
        <h2 style="margin-top: 0; text-align: center;">Panel de Control - Reservas</h2>
        <div class="reservas-grid" id="lista-reservas-club">
            </div>
    </div>

    <script type="module">
        // 1. Importar herramientas de Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 2. Tu configuración exacta
        const firebaseConfig = {
            apiKey: "AIzaSyAMRLDlarJiomWY4IX5c6CR3RFWHqmMu30",
            authDomain: "greenpoint-80ba8.firebaseapp.com",
            projectId: "greenpoint-80ba8",
            storageBucket: "greenpoint-80ba8.firebasestorage.app",
            messagingSenderId: "553295919513",
            appId: "1:553295919513:web:79d5da1a535e3835e0bb08"
        };

        // 3. Iniciar Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const horariosBase = ["23:00", "22:00", "21:00", "20:00", "19:00", "18:00"];

        // Función para cambiar pantallas
        window.cambiarVista = function(vista) {
            document.getElementById('pantalla-jugador').style.display = vista === 'jugador' ? 'block' : 'none';
            document.getElementById('pantalla-club').style.display = vista === 'club' ? 'block' : 'none';
            document.getElementById('btn-jugador').classList.toggle('activo', vista === 'jugador');
            document.getElementById('btn-club').classList.toggle('activo', vista === 'club');
        }

        // Función para enviar datos a la base de datos
        window.reservarCancha = async function(hora) {
            const nombre = prompt(`Vas a reservar a las ${hora} hs.\nPor favor, ingresa tu Nombre y Apellido:`);
            
            if (nombre && nombre.trim() !== "") {
                try {
                    await addDoc(collection(db, "reservas"), {
                        hora: hora,
                        jugador: nombre,
                        fechaRegistro: new Date()
                    });
                    alert("¡Reserva guardada con éxito!");
                } catch (error) {
                    console.error("Error al guardar:", error);
                    alert("Hubo un error de conexión.");
                }
            }
        }

        // 4. ESCUCHAR LA BASE DE DATOS EN TIEMPO REAL
        onSnapshot(collection(db, "reservas"), (snapshot) => {
            const reservas = [];
            snapshot.forEach((doc) => reservas.push(doc.data()));

            const contenedorHorarios = document.getElementById('lista-horarios');
            const contenedorClub = document.getElementById('lista-reservas-club');
            
            contenedorHorarios.innerHTML = '';
            contenedorClub.innerHTML = '';

            const horasOcupadas = reservas.map(r => r.hora);

            // Dibujar lista de jugador (solo los libres)
            horariosBase.forEach(hora => {
                if (!horasOcupadas.includes(hora)) {
                    const div = document.createElement('div');
                    div.className = 'turno-item';
                    div.onclick = () => window.reservarCancha(hora);
                    div.innerHTML = `<span class="punto-verde"></span><span class="hora">${hora} hs | </span><span class="texto-disponible">Turno disponible</span>`;
                    contenedorHorarios.appendChild(div);
                }
            });

            // Dibujar panel del club (tarjetas naranjas)
            if (reservas.length === 0) {
                contenedorClub.innerHTML = '<div class="mensaje-vacio">Aún no hay reservas hoy.</div>';
            } else {
                // Ordenar por hora
                reservas.sort((a, b) => a.hora.localeCompare(b.hora));
                reservas.forEach(reserva => {
                    const tarjeta = document.createElement('div');
                    tarjeta.className = 'tarjeta-reserva';
                    tarjeta.innerHTML = `
                        <p style="font-size: 1.2em; border-bottom: 1px solid #171d24; padding-bottom: 5px;">${reserva.hora} hs</p>
                        <p>👤 ${reserva.jugador}</p>
                        <p>📌 Padel - Cancha 1</p>
                        <p>Saldo: Pendiente</p>
                    `;
                    contenedorClub.appendChild(tarjeta);
                });
            }
        });
    </script>
</body>
</html>
