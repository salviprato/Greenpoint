<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Canchas Greenpoint</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #171d24; 
            color: #ffffff; 
            margin: 0; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .controles-vista { display: flex; gap: 15px; margin-bottom: 30px; }
        .btn-vista {
            background-color: #2c3540; color: white; border: 1px solid #44505d;
            padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        .btn-vista.activo { background-color: #3b82f6; border-color: #3b82f6; }

        /* Vista Jugador */
        .vista-jugador {
            background-color: #1e252d; width: 100%; max-width: 400px;
            border-radius: 12px; padding: 20px; box-sizing: border-box;
        }
        
        .calendario-strip {
            display: flex; overflow-x: auto; gap: 10px; padding-bottom: 12px; margin-bottom: 15px; border-bottom: 1px solid #2c3540;
        }
        .calendario-strip::-webkit-scrollbar { height: 6px; }
        .calendario-strip::-webkit-scrollbar-thumb { background: #44505d; border-radius: 4px; }
        
        .dia-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-width: 65px; padding: 12px 8px; background-color: #242c36; border-radius: 10px;
            cursor: pointer; border: 1px solid transparent; transition: 0.2s;
        }
        .dia-item:hover { background-color: #2c3540; }
        .dia-item.activo { background-color: #3b82f6; border-color: #3b82f6; color: white; transform: scale(1.05); }
        .dia-nombre { font-size: 0.8em; color: #9ca3af; text-transform: uppercase; font-weight: bold;}
        .dia-item.activo .dia-nombre { color: #e5e7eb; }
        .dia-numero { font-size: 1.4em; font-weight: bold; margin-top: 4px; }

        .sub-header { display: flex; justify-content: space-between; align-items: center; color: #9ca3af; font-size: 0.9em; padding-bottom: 10px; border-bottom: 1px solid #2c3540; margin-bottom: 10px; font-weight: bold;}
        
        #lista-horarios { max-height: 500px; overflow-y: auto; padding-right: 5px; }
        #lista-horarios::-webkit-scrollbar { width: 6px; }
        #lista-horarios::-webkit-scrollbar-thumb { background: #44505d; border-radius: 4px; }

        .turno-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #2c3540; cursor: pointer; transition: 0.2s; }
        .turno-item:hover { background-color: #242c36; }
        .punto-verde { height: 10px; width: 10px; background-color: #10b981; border-radius: 50%; margin-right: 15px; min-width: 10px; }
        .hora { font-weight: bold; margin-right: 8px; }
        .texto-disponible { color: #d1d5db; font-size: 0.9em; }
        .texto-canchas-disp { font-size: 0.8em; color: #10b981; margin-left: auto; font-weight: bold;}

        /* Vista Club */
        .vista-club {
            display: none; background-color: #1e252d; width: 100%; max-width: 900px;
            border-radius: 12px; padding: 20px; box-sizing: border-box;
        }

        .contenedor-grilla {
            display: flex; overflow-x: auto; background: #1e252d; border: 1px solid #2c3540; 
            border-radius: 8px; margin-top: 15px; user-select: none;
        }
        .contenedor-grilla::-webkit-scrollbar { height: 8px; }
        .contenedor-grilla::-webkit-scrollbar-thumb { background: #44505d; border-radius: 4px; }
        
        .tarjeta-reserva-grilla {
            background-color: #f6a74b; color: #171d24; border-left: 5px solid #d97706; transition: 0.1s;
        }
        .tarjeta-reserva-grilla:hover { filter: brightness(1.1); }
        .tarjeta-reserva-grilla.asistio { background-color: #3b82f6; color: #ffffff; border-left: 5px solid #1d4ed8; }
        
        .mensaje-vacio { color: #9ca3af; text-align: center; margin-top: 20px; width: 100%; }

        /* Modales */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: #1e252d; padding: 25px; border-radius: 12px; width: 90%; max-width: 320px;
            display: flex; flex-direction: column; gap: 12px; border: 1px solid #44505d; text-align: center;
        }
        .input-form {
            padding: 10px; border-radius: 6px; border: 1px solid #44505d; background-color: #171d24; 
            color: white; color-scheme: dark; font-family: inherit; width: 100%; box-sizing: border-box;
        }
        .btn-modal { padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; color: white; font-size: 1em; transition: 0.2s;}
        .btn-guardar { background-color: #10b981; } .btn-guardar:hover { background-color: #059669; }
        .btn-asistencia { background-color: #3b82f6; } .btn-asistencia:hover { background-color: #2563eb; }
        .btn-pago { background-color: #10b981; } .btn-pago:hover { background-color: #059669; }
        .btn-nopago { background-color: #f59e0b; } .btn-nopago:hover { background-color: #d97706; }
        .btn-eliminar { background-color: #ef4444; } .btn-eliminar:hover { background-color: #dc2626; }
        .btn-cerrar { background-color: #4b5563; margin-top: 10px;}
    </style>
</head>
<body>

    <div class="controles-vista">
        <button id="btn-jugador" class="btn-vista activo" onclick="window.cambiarVista('jugador')">📱 Vista Jugadores</button>
        <button id="btn-club" class="btn-vista" onclick="window.cambiarVista('club')">💻 Vista Club</button>
    </div>

    <div id="pantalla-jugador" class="vista-jugador">
        <h2 style="margin-top: 0; margin-bottom: 20px;">Reserva de canchas</h2>
        
        <div id="calendario-jugador" class="calendario-strip"></div>

        <div class="sub-header">
            <span>Horarios Disponibles</span>
            <span>Greenpoint</span>
        </div>
        <div id="lista-horarios">Cargando horarios...</div>
    </div>

    <div id="pantalla-club" class="vista-club">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0;">Panel de Control</h2>
            <button onclick="window.abrirModalConfig()" style="background: none; border: none; font-size: 1.5em; cursor: pointer; color: #9ca3af; transition: 0.2s;" onmouseover="this.style.color='white'" onmouseout="this.style.color='#9ca3af'" title="Configuración del Club">⚙️</button>
        </div>

        <div id="calendario-club" class="calendario-strip"></div>
        <div id="lista-reservas-club"></div>
    </div>

    <div id="modal-reserva-jugador" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin: 0; margin-bottom: 5px;">Confirmar Reserva</h3>
            <p style="margin: 0; color: #9ca3af; margin-bottom: 15px;">Fecha: <strong id="reserva-fecha-display" style="color:white;"></strong><br>Horario: <strong id="reserva-hora-display" style="color:white;"></strong></p>
            
            <div style="text-align: left; display: flex; flex-direction: column; gap: 15px;">
                <div>
                    <label style="font-size: 0.9em; color: #d1d5db; font-weight: bold;">1. Elige tu cancha:</label>
                    <select id="select-cancha-modal" class="input-form" style="margin-top: 5px;">
                        </select>
                </div>
                <div>
                    <label style="font-size: 0.9em; color: #d1d5db; font-weight: bold;">2. Nombre y Apellido:</label>
                    <input type="text" id="input-nombre-jugador" class="input-form" placeholder="Ej: Franco Aramayo" style="margin-top: 5px;">
                </div>
            </div>

            <button class="btn-modal btn-guardar" style="margin-top: 20px;" onclick="window.confirmarReservaJugador()">Confirmar Reserva</button>
            <button class="btn-modal btn-cerrar" style="margin-top: 0;" onclick="window.cerrarModalReservaJugador()">Cancelar</button>
        </div>
    </div>

    <div id="modal-config" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin: 0; margin-bottom: 10px; border-bottom: 1px solid #44505d; padding-bottom: 10px;">⚙️ Configuración</h3>
            <div style="text-align: left; display: flex; flex-direction: column; gap: 10px;">
                <div><label style="font-size: 0.9em; color: #d1d5db;">Abre a las:</label><input type="time" id="input-apertura" class="input-form"></div>
                <div><label style="font-size: 0.9em; color: #d1d5db;">Cierra a las:</label><input type="time" id="input-cierre" class="input-form"></div>
                <div><label style="font-size: 0.9em; color: #d1d5db;">Precio Turno ($):</label><input type="number" id="input-precio" step="500" class="input-form"></div>
                <div><label style="font-size: 0.9em; color: #d1d5db;">Cantidad de Canchas:</label><input type="number" id="input-canchas" min="1" max="20" class="input-form"></div>
            </div>
            <button class="btn-modal btn-guardar" style="margin-top: 10px;" onclick="window.guardarConfiguracion()">Guardar Todo</button>
            <button class="btn-modal btn-cerrar" style="margin-top: 0;" onclick="window.cerrarModalConfig()">Cancelar</button>
        </div>
    </div>

    <div id="modal-acciones" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin: 0; margin-bottom: 10px;">Gestionar Turno</h3>
            <button class="btn-modal btn-asistencia" onclick="window.accionAsistencia()">✔️ Confirmar Asistencia</button>
            <button class="btn-modal btn-pago" onclick="window.accionPago()">✅ Marcar como Pagado</button>
            <button class="btn-modal btn-nopago" onclick="window.accionNoPago()">❌ Marcar como No Pagado</button>
            <button class="btn-modal btn-eliminar" onclick="window.accionEliminar()">🗑️ Eliminar Reserva</button>
            <button class="btn-modal btn-cerrar" onclick="window.cerrarModalAcciones()">Cancelar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMRLDlarJiomWY4IX5c6CR3RFWHqmMu30",
            authDomain: "greenpoint-80ba8.firebaseapp.com",
            projectId: "greenpoint-80ba8",
            storageBucket: "greenpoint-80ba8.firebasestorage.app",
            messagingSenderId: "553295919513",
            appId: "1:553295919513:web:79d5da1a535e3835e0bb08"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- CALENDARIO ---
        let fechasValidas = [];
        let fechaActual = new Date();
        for (let i = 0; i <= 7; i++) {
            let f = new Date(fechaActual);
            f.setDate(f.getDate() + i);
            let anio = f.getFullYear();
            let mes = (f.getMonth() + 1).toString().padStart(2, '0');
            let dia = f.getDate().toString().padStart(2, '0');
            fechasValidas.push(`${anio}-${mes}-${dia}`); 
        }
        let fechaSeleccionada = fechasValidas[0]; 

        function renderizarCalendarios() {
            const calJugador = document.getElementById('calendario-jugador');
            const calClub = document.getElementById('calendario-club');
            calJugador.innerHTML = ''; calClub.innerHTML = '';
            const diasCortos = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];

            fechasValidas.forEach((fechaISO, index) => {
                const partes = fechaISO.split('-');
                const f = new Date(partes[0], partes[1] - 1, partes[2]);
                const nombreDia = index === 0 ? 'HOY' : diasCortos[f.getDay()];
                const numeroDia = f.getDate().toString().padStart(2, '0');
                const esActivo = fechaISO === fechaSeleccionada ? 'activo' : '';

                const htmlDia = `<div class="dia-item ${esActivo}" onclick="window.seleccionarFecha('${fechaISO}')"><span class="dia-nombre">${nombreDia}</span><span class="dia-numero">${numeroDia}</span></div>`;
                calJugador.innerHTML += htmlDia;
                calClub.innerHTML += htmlDia;
            });
        }

        window.seleccionarFecha = function(fechaISO) {
            fechaSeleccionada = fechaISO;
            renderizarCalendarios(); renderizarPantallas();   
        }

        // --- VARIABLES GLOBALES ---
        const horariosBase = [];
        for (let h = 0; h <= 23; h++) { 
            let horaStr = h.toString().padStart(2, '0');
            horariosBase.push(`${horaStr}:00`); horariosBase.push(`${horaStr}:30`);
        }
        horariosBase.reverse(); 

        let horaApertura = "08:00"; 
        let horaCierre = "23:30";   
        let precioGlobal = "15000"; 
        let cantidadCanchasGlobal = 1; 
        let reservasGlobales = [];
        let reservaSeleccionadaId = null; 
        let reservaEnProcesoHora = null; // Guarda la hora que el jugador acaba de clickear

        // --- MATEMÁTICAS DE TIEMPO ---
        window.aMinutos = function(horaStr) { let [h, m] = horaStr.split(':').map(Number); return (h * 60) + m; }
        window.sumarMinutos = function(horaStr, minutosAñadir) {
            let [h, m] = horaStr.split(':').map(Number); let total = (h * 60) + m + minutosAñadir;
            let nuevaH = Math.floor(total / 60); let nuevoM = total % 60;
            if (nuevaH >= 24) nuevaH -= 24; return `${nuevaH.toString().padStart(2, '0')}:${nuevoM.toString().padStart(2, '0')}`;
        }

        // --- NAVEGACIÓN Y MODALES ---
        window.cambiarVista = function(vista) {
            document.getElementById('pantalla-jugador').style.display = vista === 'jugador' ? 'block' : 'none';
            document.getElementById('pantalla-club').style.display = vista === 'club' ? 'block' : 'none';
            document.getElementById('btn-jugador').classList.toggle('activo', vista === 'jugador');
            document.getElementById('btn-club').classList.toggle('activo', vista === 'club');
        }

        window.abrirModalConfig = function() { document.getElementById('modal-config').style.display = 'flex'; }
        window.cerrarModalConfig = function() { document.getElementById('modal-config').style.display = 'none'; }
        window.abrirModal = function(id) { reservaSeleccionadaId = id; document.getElementById('modal-acciones').style.display = 'flex'; }
        window.cerrarModalAcciones = function() { reservaSeleccionadaId = null; document.getElementById('modal-acciones').style.display = 'none'; }

        // --- NUEVO: FUNCIONES DEL MODAL DE RESERVA JUGADOR ---
        window.abrirModalReservaJugador = function(hora) {
            reservaEnProcesoHora = hora;
            
            // Formatear fecha bonita
            const partes = fechaSeleccionada.split('-');
            const f = new Date(partes[0], partes[1] - 1, partes[2]);
            document.getElementById('reserva-fecha-display').innerText = `${f.getDate()}/${f.getMonth() + 1}/${f.getFullYear()}`;
            document.getElementById('reserva-hora-display').innerText = `${hora} hs`;

            // Calcular canchas libres EXACTAMENTE para esta hora (y las siguientes 1.5hs)
            let bloque1 = hora;
            let bloque2 = window.sumarMinutos(hora, 30);
            let bloque3 = window.sumarMinutos(hora, 60);

            const reservasDelDia = reservasGlobales.filter(r => (r.fecha || fechasValidas[0]) === fechaSeleccionada);
            let canchasOcupadas = new Set();
            
            reservasDelDia.forEach(r => {
                let rB1 = r.hora;
                let rB2 = window.sumarMinutos(r.hora, 30);
                let rB3 = window.sumarMinutos(r.hora, 60);
                
                // Si la reserva choca con nuestros 3 bloques, esa cancha está ocupada
                if (rB1 === bloque1 || rB1 === bloque2 || rB1 === bloque3 ||
                    rB2 === bloque1 || rB2 === bloque2 || rB2 === bloque3 ||
                    rB3 === bloque1 || rB3 === bloque2 || rB3 === bloque3) {
                    canchasOcupadas.add(parseInt(r.cancha || "1"));
                }
            });

            // Llenar el Dropdown solo con las libres
            const selectCancha = document.getElementById('select-cancha-modal');
            selectCancha.innerHTML = '';
            for(let c = 1; c <= cantidadCanchasGlobal; c++) {
                if(!canchasOcupadas.has(c)) {
                    selectCancha.innerHTML += `<option value="${c}" style="color: black;">Cancha ${c}</option>`;
                }
            }

            document.getElementById('input-nombre-jugador').value = ""; // Limpiar input
            document.getElementById('modal-reserva-jugador').style.display = 'flex';
        }

        window.cerrarModalReservaJugador = function() {
            reservaEnProcesoHora = null;
            document.getElementById('modal-reserva-jugador').style.display = 'none';
        }

        window.confirmarReservaJugador = async function() {
            const nombre = document.getElementById('input-nombre-jugador').value;
            const cancha = document.getElementById('select-cancha-modal').value;

            if (!nombre || nombre.trim() === "") {
                alert("Por favor, ingresa tu Nombre y Apellido.");
                return;
            }

            try {
                await addDoc(collection(db, "reservas"), { 
                    fecha: fechaSeleccionada, 
                    hora: reservaEnProcesoHora, 
                    cancha: cancha, 
                    jugador: nombre, 
                    fechaRegistro: new Date(), 
                    asistencia: false, 
                    pagado: false      
                });
                alert("¡Reserva guardada con éxito!");
                window.cerrarModalReservaJugador();
            } catch (error) { alert("Hubo un error de conexión."); }
        }
        // -----------------------------------------------------

        window.guardarConfiguracion = async function() {
            const apertura = document.getElementById('input-apertura').value;
            const cierre = document.getElementById('input-cierre').value;
            const precio = document.getElementById('input-precio').value;
            const canchas = document.getElementById('input-canchas').value; 
            
            if(apertura && cierre && precio && canchas) {
                try { 
                    await setDoc(doc(db, "configuracion", "club"), { horaApertura: apertura, horaCierre: cierre, precioTurno: precio, canchas: canchas }); 
                    window.cerrarModalConfig();
                    alert("¡Configuración guardada!"); 
                } catch (error) { alert("Error al guardar."); }
            }
        }

        window.accionAsistencia = async function() { if(reservaSeleccionadaId) { await updateDoc(doc(db, "reservas", reservaSeleccionadaId), { asistencia: true }); window.cerrarModalAcciones(); } }
        window.accionPago = async function() { if(reservaSeleccionadaId) { await updateDoc(doc(db, "reservas", reservaSeleccionadaId), { pagado: true }); window.cerrarModalAcciones(); } }
        window.accionNoPago = async function() { if(reservaSeleccionadaId) { await updateDoc(doc(db, "reservas", reservaSeleccionadaId), { pagado: false }); window.cerrarModalAcciones(); } }
        window.accionEliminar = async function() { if(reservaSeleccionadaId && confirm("¿Borrar reserva?")) { await deleteDoc(doc(db, "reservas", reservaSeleccionadaId)); window.cerrarModalAcciones(); } }

        onSnapshot(doc(db, "configuracion", "club"), (documento) => {
            if (documento.exists()) {
                horaApertura = documento.data().horaApertura || "08:00";
                horaCierre = documento.data().horaCierre || "23:30";
                precioGlobal = documento.data().precioTurno || "15000";
                cantidadCanchasGlobal = parseInt(documento.data().canchas) || 1; 
                
                document.getElementById('input-apertura').value = horaApertura;
                document.getElementById('input-cierre').value = horaCierre;
                document.getElementById('input-precio').value = precioGlobal;
                document.getElementById('input-canchas').value = cantidadCanchasGlobal;
            }
            renderizarPantallas(); 
        });

        onSnapshot(collection(db, "reservas"), (snapshot) => {
            reservasGlobales = [];
            snapshot.forEach((doc) => reservasGlobales.push({ id: doc.id, ...doc.data() }));
            renderizarPantallas(); 
        });

        window.renderizarPantallas = function() {
            // 1. RENDERIZAR VISTA JUGADOR (Nueva Lógica)
            const contenedorHorarios = document.getElementById('lista-horarios');
            contenedorHorarios.innerHTML = '';
            
            const reservasDelDia = reservasGlobales.filter(r => (r.fecha || fechasValidas[0]) === fechaSeleccionada);
            const horariosFiltrados = horariosBase.filter(h => h >= horaApertura && h <= horaCierre);

            horariosFiltrados.forEach(hora => {
                let bloque1 = hora;
                let bloque2 = window.sumarMinutos(hora, 30);
                let bloque3 = window.sumarMinutos(hora, 60);
                
                // Descubrimos cuántas canchas están chocando con este horario
                let canchasOcupadas = new Set();
                reservasDelDia.forEach(r => {
                    let rB1 = r.hora;
                    let rB2 = window.sumarMinutos(r.hora, 30);
                    let rB3 = window.sumarMinutos(r.hora, 60);
                    
                    if (rB1 === bloque1 || rB1 === bloque2 || rB1 === bloque3 ||
                        rB2 === bloque1 || rB2 === bloque2 || rB2 === bloque3 ||
                        rB3 === bloque1 || rB3 === bloque2 || rB3 === bloque3) {
                        canchasOcupadas.add(parseInt(r.cancha || "1"));
                    }
                });

                let canchasLibres = cantidadCanchasGlobal - canchasOcupadas.size;
                let minInicio = window.aMinutos(hora);
                let minCierre = window.aMinutos(horaCierre);
                if (minCierre === 0) minCierre = 1440; 

                // Solo mostramos el horario si hay al menos 1 cancha libre
                if (canchasLibres > 0 && (minInicio + 90) <= minCierre) {
                    const div = document.createElement('div'); div.className = 'turno-item';
                    div.onclick = () => window.abrirModalReservaJugador(hora);
                    
                    let textoCanchas = canchasLibres === 1 ? "1 libre" : `${canchasLibres} libres`;
                    
                    div.innerHTML = `<span class="punto-verde"></span><span class="hora">${hora} hs | </span><span class="texto-disponible">Turno 1.5 hs</span><span class="texto-canchas-disp">${textoCanchas}</span>`;
                    contenedorHorarios.appendChild(div);
                }
            });

            // 2. RENDERIZAR VISTA CLUB (Tabla Vertical)
            const contenedorClub = document.getElementById('lista-reservas-club');
            contenedorClub.innerHTML = '';

            if (reservasDelDia.length === 0) {
                contenedorClub.innerHTML = '<div class="mensaje-vacio">No hay reservas para este día en ninguna cancha.</div>';
                return;
            }

            let minActual = window.aMinutos(horaApertura);
            let minFin = window.aMinutos(horaCierre);
            if (minFin <= minActual) minFin += 1440; 

            let htmlGrilla = `<div class="contenedor-grilla">`;
            
            // Columna de Horas
            htmlGrilla += `<div style="width: 55px; flex-shrink: 0; border-right: 1px solid #2c3540; background: #1e252d;">`;
            htmlGrilla += `<div style="height: 40px; border-bottom: 1px solid #2c3540; background: #242c36;"></div>`; 
            for (let m = minActual; m < minFin; m += 30) {
                let esHoraEnPunto = (m % 60 === 0);
                let hLabel = Math.floor(m / 60) % 24;
                let borderStyle = esHoraEnPunto ? 'border-bottom: 1px dashed rgba(255,255,255,0.05);' : 'border-bottom: 1px solid #2c3540;';
                let texto = esHoraEnPunto ? `${hLabel.toString().padStart(2, '0')}:00` : ``;
                htmlGrilla += `<div style="height: 40px; ${borderStyle} text-align: center; color: #9ca3af; font-size: 0.8em; padding-top: 3px; box-sizing: border-box;">${texto}</div>`;
            }
            htmlGrilla += `</div>`;

            // Columnas de Canchas
            for(let c = 1; c <= cantidadCanchasGlobal; c++) {
                htmlGrilla += `<div style="flex: 1; min-width: 140px; border-right: 1px solid #2c3540; position: relative;">`;
                htmlGrilla += `<div style="height: 40px; border-bottom: 1px solid #2c3540; text-align: center; line-height: 40px; font-weight: bold; background: #242c36; font-size: 0.9em;">Cancha ${c}</div>`;
                
                for (let m = minActual; m < minFin; m += 30) {
                    let esHoraEnPunto = (m % 60 === 0);
                    let borderStyle = esHoraEnPunto ? 'border-bottom: 1px dashed rgba(255,255,255,0.05);' : 'border-bottom: 1px solid #2c3540;';
                    htmlGrilla += `<div style="height: 40px; ${borderStyle} box-sizing: border-box;"></div>`;
                }

                let reservasCancha = reservasDelDia.filter(r => (r.cancha || "1") == c);
                reservasCancha.forEach(res => {
                    let minRes = window.aMinutos(res.hora);
                    if (minRes < minActual && minFin > 1440) minRes += 1440;
                    
                    let offsetTop = ((minRes - minActual) / 30) * 40 + 40; 
                    let height = 3 * 40; 

                    let extraClass = res.asistencia ? "asistio" : "";
                    let colorTexto = res.asistencia ? "white" : "#171d24";
                    let textoSaldo = res.pagado ? "✅" : "Pend";
                    
                    htmlGrilla += `
                        <div class="tarjeta-reserva-grilla ${extraClass}" onclick="window.abrirModal('${res.id}')" 
                             style="position: absolute; top: ${offsetTop}px; left: 4px; right: 4px; height: ${height - 6}px; 
                                    padding: 8px; font-size: 0.85em; overflow: hidden; border-radius: 6px; cursor: pointer; 
                                    box-shadow: 0 4px 6px rgba(0,0,0,0.4); display: flex; flex-direction: column; z-index: 10;">
                            <span style="font-weight: 900; font-size: 1.1em; color: ${colorTexto}; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${res.jugador}</span>
                            <span style="margin-top: 4px; color: ${colorTexto}; opacity: 0.8; font-weight: 700;">📌 ${res.hora} hs</span>
                            <span style="margin-top: auto; font-weight: bold; color: ${colorTexto};">Pago: ${textoSaldo}</span>
                        </div>
                    `;
                });
                
                htmlGrilla += `</div>`; 
            }
            htmlGrilla += `</div>`; 

            contenedorClub.innerHTML = htmlGrilla;
        }

        renderizarCalendarios();

    </script>
</body>
</html>
